name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Verify CLI entrypoint
        run: |
          quizmd --version
          quizmd --validate quizzes/harry-potter-quiz.md

      - name: Run tests
        run: |
          python -m unittest discover -s tests -q

  package-smoke:
    name: Package smoke (clean venv)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in clean venv and smoke run
        run: |
          python -m venv .smoke-venv
          . .smoke-venv/bin/activate
          pip install --upgrade pip
          pip install dist/quizmd-*.whl
          quizmd --version
          mkdir smoke-check
          cd smoke-check
          quizmd init --force
          test -f hello-millionaire.md
          quizmd --validate hello-millionaire.md
